name: Scrape Otakudesu Data

on:
  schedule:
    # Run setiap 5 menit
    - cron: '*/5 * * * *'
  # Allow manual trigger dari GitHub UI
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch

      - name: Create snapshots directory
        run: mkdir -p public/api-snapshots

      - name: Scrape Otakudesu data
        run: node scripts/scrape-snapshot.js
        env:
          API_URL: https://api-otakudesu-zeta.vercel.app

      - name: Commit and push snapshots
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/api-snapshots/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update otakudesu data snapshots" && git push)
